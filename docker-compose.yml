version: "3.8"

services:
  bid-announce:
    image: ghcr.io/ericyaoxr/bid-announce-system:latest
    # 如需本地构建，取消注释下面一行并注释上面的 image
    # build: .
    container_name: bid-announce
    restart: unless-stopped
    ports:
      - "${PORT:-8000}:8000"
    volumes:
      - ./data:/app/data
    environment:
      - TZ=Asia/Shanghai
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/dashboard')"]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3
